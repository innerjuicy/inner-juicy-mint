<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INNER JUICY Minting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .neon-text { text-shadow: 0 0 5px #fff, 0 0 10px #fff; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center py-10">

    <div class="w-full max-w-4xl px-4 mb-10">
        <img src="image_e7ca77.jpg" alt="Inner Juicy Banner" class="w-full h-auto rounded-xl shadow-2xl">
    </div>

    <div class="w-full max-w-xl bg-gray-900 border border-gray-700 rounded-2xl p-8 shadow-[0_0_20px_rgba(255,255,255,0.1)] relative">
        <h1 class="text-4xl font-bold text-center mb-2 neon-text">INNER JUICY</h1>
        <p class="text-center text-gray-400 mb-8">Total Supply: 3,333</p>

        <div class="flex justify-between items-center bg-black p-4 rounded-lg mb-8 border border-gray-800">
            <div>
                <p id="wallet-address" class="text-sm text-gray-400">Wallet not connected.</p>
                <p id="eth-balance" class="text-lg font-bold text-green-400 mt-1">0.00 ETH</p>
            </div>
            <button id="connect-btn" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">
                Connect Wallet
            </button>
        </div>

        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-3">Current Phase</label>
            <div class="grid grid-cols-3 gap-3">
                <button class="phase-btn bg-white text-black font-bold py-3 rounded-lg transition" data-phase="gtd" data-limit="2">GTD</button>
                <button class="phase-btn bg-gray-800 text-gray-400 font-bold py-3 rounded-lg hover:bg-gray-700 transition" data-phase="fcfs" data-limit="2">FCFS</button>
                <button class="phase-btn bg-gray-800 text-gray-400 font-bold py-3 rounded-lg hover:bg-gray-700 transition" data-phase="public" data-limit="1">Public</button>
            </div>
            <p id="phase-desc" class="text-xs text-center text-gray-500 mt-3">Max 2 per wallet</p>
        </div>

        <div class="flex items-center gap-4 mb-8">
            <button id="minus-btn" class="w-12 h-12 bg-gray-800 rounded-lg text-xl hover:bg-gray-700">-</button>
            <input type="number" id="mint-amount" value="1" readonly class="flex-1 h-12 bg-black border border-gray-700 rounded-lg text-center text-xl text-white outline-none">
            <button id="plus-btn" class="w-12 h-12 bg-gray-800 rounded-lg text-xl hover:bg-gray-700">+</button>
        </div>

        <button id="mint-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-500 text-white text-xl font-bold py-4 rounded-xl hover:opacity-90 transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
            CLAIM AIRDROP
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">*Only Gas Fee applies.</p>

        <div class="mt-8 pt-6 border-t border-gray-800 flex justify-center gap-6">
            <a href="#" target="_blank" class="text-gray-500 hover:text-white transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
            
            <a href="https://discord.gg/eHbCfuPeHB" target="_blank" class="text-gray-500 hover:text-white transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.118.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.028zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </a>

            <a href="#" target="_blank" class="text-gray-500 hover:text-white transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21.282 12.723c-.158-.236-.458-.334-.725-.236-.345.127-.678.29-.99.484-.52.32-.98.718-1.385 1.173a11.176 11.176 0 01-1.637 1.488 9.537 9.537 0 01-2.274 1.17 6.442 6.442 0 01-2.613.43c-.878-.052-1.748-.255-2.573-.6-.62-.26-1.21-.577-1.76-1.05-.19-.163-.448-.173-.65-.027-.202.146-.28.4-.187.625.328.79.79 1.503 1.353 2.102.56.593 1.2.1 1.897 1.517.702.42 1.455.753 2.246.99.796.24 1.62.36 2.45.358.834.004 1.66-.11 2.46-.338.8-.225 1.567-.557 2.275-1.026.712-.472 1.35-1.04 1.91-1.677.564-.644 1.03-1.372 1.38-2.164.08-.184.053-.397-.087-.534h-.002a24.162 24.162 0 00-1.092-1.085zM12 1.5A10.5 10.5 0 1022.5 12 10.512 10.512 0 0012 1.5zm0 18A7.5 7.5 0 1119.5 12 7.508 7.508 0 0112 19.5zm3.75-9.375a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        let provider, signer, userAddress, contract;
        let currentPhase = 'gtd';
        let currentMaxLimit = 2;
        
        // --- 🚨 스마트 컨트랙트 배포 후 수정할 부분 ---
        const contractAddress = "0x여기에_스마트컨트랙트_주소를_넣으세요";
        const contractABI = [
            "function mint(uint256 amount) public",
            "function totalSupply() public view returns (uint256)"
        ];
        // ---------------------------------------------

        const connectBtn = document.getElementById('connect-btn');
        const walletAddressEl = document.getElementById('wallet-address');
        const ethBalanceEl = document.getElementById('eth-balance');
        const mintAmountInput = document.getElementById('mint-amount');
        const minusBtn = document.getElementById('minus-btn');
        const plusBtn = document.getElementById('plus-btn');
        const mintBtn = document.getElementById('mint-btn');
        const phaseBtns = document.querySelectorAll('.phase-btn');
        const phaseDesc = document.getElementById('phase-desc');

        phaseBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                phaseBtns.forEach(b => {
                    b.classList.remove('bg-white', 'text-black');
                    b.classList.add('bg-gray-800', 'text-gray-400');
                });
                
                btn.classList.remove('bg-gray-800', 'text-gray-400');
                btn.classList.add('bg-white', 'text-black');

                currentPhase = btn.getAttribute('data-phase');
                currentMaxLimit = parseInt(btn.getAttribute('data-limit'));
                
                phaseDesc.innerText = `Max ${currentMaxLimit} per wallet`;
                mintAmountInput.value = 1;
            });
        });

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    userAddress = await signer.getAddress();
                    
                    contract = new ethers.Contract(contractAddress, contractABI, signer);

                    walletAddressEl.innerText = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                    connectBtn.innerText = 'Connected';
                    connectBtn.classList.add('bg-green-500', 'text-white', 'border-none');
                    connectBtn.disabled = true;
                    updateBalance();
                } catch (error) {
                    console.error("User denied account access");
                }
            } else {
                alert('Please install MetaMask!');
            }
        }

        async function updateBalance() {
            if (provider && userAddress) {
                const balance = await provider.getBalance(userAddress);
                const ethBalance = ethers.utils.formatEther(balance);
                ethBalanceEl.innerText = parseFloat(ethBalance).toFixed(4) + ' ETH';
            }
        }

        function updateAmount(change) {
            let currentAmount = parseInt(mintAmountInput.value);
            let newAmount = currentAmount + change;
            if (newAmount >= 1 && newAmount <= currentMaxLimit) {
                mintAmountInput.value = newAmount;
            }
        }

        minusBtn.addEventListener('click', () => updateAmount(-1));
        plusBtn.addEventListener('click', () => updateAmount(1));
        connectBtn.addEventListener('click', connectWallet);

        mintBtn.addEventListener('click', async () => {
            if (!signer) {
                alert('Please connect your wallet first.');
                return;
            }
            if (contractAddress === "0x여기에_스마트컨트랙트_주소를_넣으세요") {
                alert('This is a UI test version. Smart contract is not yet connected!');
                return;
            }
            
            const amount = mintAmountInput.value;
            
            try {
                mintBtn.innerText = 'Claiming...';
                mintBtn.disabled = true;
                const tx = await contract.mint(amount);
                await tx.wait(); 
                alert(`Success! Claimed ${amount} INNER JUICY!`);
                updateBalance();
            } catch (error) {
                console.error("Transaction Error:", error);
                alert('Error during transaction. (Rejected, insufficient gas, etc.)');
            } finally {
                mintBtn.innerText = 'CLAIM AIRDROP';
                mintBtn.disabled = false;
            }
        });

        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    connectWallet();
                } else {
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
